# Catppuccin Mocha

set -g mode-style "fg=#89b4fa,bg=#313244"

set -g message-style "fg=#89b4fa,bg=#313244"
set -g message-command-style "fg=#89b4fa,bg=#313244"

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

set -g status-style "fg=#89b4fa,bg=#161621"

set -g status-left "#[fg=#12121b,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#161621,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#161621,bg=#161621,nobold,nounderscore,noitalics]#[fg=#89b4fa,bg=#161621] #{prefix_highlight} #(agent-manager --status --icon-color=#b4befe --approval-color=#f38ba8 --finished-color=#89dceb --working-color=#f9e2af --waiting-color=#a6e3a1)#[fg=#313244,bg=#161621,nobold,nounderscore,noitalics]#[fg=#89b4fa,bg=#313244] %Y-%m-%d  %I:%M %p #[fg=#89b4fa,bg=#313244,nobold,nounderscore,noitalics]#[fg=#12121b,bg=#89b4fa,bold] #h "
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set -g status-right "#[fg=#161621,bg=#161621,nobold,nounderscore,noitalics]#[fg=#89b4fa,bg=#161621] #{prefix_highlight} #(agent-manager --status --icon-color=#b4befe --approval-color=#f38ba8 --finished-color=#89dceb --working-color=#f9e2af --waiting-color=#a6e3a1)#[fg=#313244,bg=#161621,nobold,nounderscore,noitalics]#[fg=#89b4fa,bg=#313244] %Y-%m-%d  %H:%M #[fg=#89b4fa,bg=#313244,nobold,nounderscore,noitalics]#[fg=#12121b,bg=#89b4fa,bold] #h "
}

setw -g window-status-activity-style "underscore,fg=#a6adc8,bg=#161621"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a6adc8,bg=#161621"
setw -g window-status-format "#[fg=#161621,bg=#161621,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#161621,bg=#161621,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#161621,bg=#313244,nobold,nounderscore,noitalics]#[fg=#89b4fa,bg=#313244,bold] #I  #W #F #[fg=#313244,bg=#161621,nobold,nounderscore,noitalics]"

set -g @prefix_highlight_output_prefix "#[fg=#f9e2af]#[bg=#161621]#[fg=#161621]#[bg=#f9e2af]"
set -g @prefix_highlight_output_suffix ""
